name: Create Release

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-release:

    runs-on: windows-2025-vs2026

    outputs:
      release_version: ${{ steps.determine_version.outputs.version }}

    strategy:
      matrix:
        include:
          - platform: windows-x64
            platform_name: Windows
          - platform: linux-x64
            platform_name: Linux
    
    steps:
      - uses: actions/checkout@v4

      - name: Determine Version
        id: determine_version
        run: |
          $version = (git rev-parse --short=7 HEAD).Trim()
          Write-Output "Version determined: $version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.0.5

      - name: Restore and Build solution
        run: msbuild HaloMods.Steamworks.slnx -t:restore -t:rebuild -property:Platform=${{ matrix.platform }} -property:Configuration=Release

      - name: Cleanse Build
        if: github.event_name != 'pull_request'
        run: |
          Get-ChildItem -Path ./HaloMods.Steamworks/bin/${{ matrix.platform }}/Release/ -Recurse -Include *.pdb,*.lib | Remove-Item -Force

      - name: Zip Payload
        if: github.event_name != 'pull_request'
        run: |
          7z a HaloMods.Steamworks_${{ matrix.platform_name }}.7z ./HaloMods.Steamworks/bin/${{ matrix.platform }}/Release/*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: payload-${{ matrix.platform }}
          path: HaloMods.Steamworks_${{ matrix.platform_name }}.7z
          retention-days: 1

  release:
    needs: build-release
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' 
    
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: payload-*
        path: release-artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*.7z
        tag_name: ${{ needs.build-release.outputs.release_version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
